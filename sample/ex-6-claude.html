<local-event-script
    id="splash-controller"
    data-signals:splashState="'hidden'"
    data-signals:exchangeRate="null"
    data-signals:rateStatus="'idle'"
>
    <on-load run="fire splash:init"></on-load>
    <on-enter run="fire splash:revealed [threshold: 0.2]"></on-enter>
    <on-exit run="call splash:hide"></on-exit>

    <on-event
        name="splash:init"
        handle="`
      set $splashState to 'entering'
      then
        fade-in  #splash  200ms ease-out and
        slide-up #splash  180ms ease-out
      then fire splash:ready
    `"
    ></on-event>

    <on-event
        name="splash:ready"
        handle="`
      set $splashState to 'visible'
      then wait 3s
      then call splash:hide
    `"
    ></on-event>

    <on-signal
        name="$splashState"
        when="$splashState == 'dismiss'"
        handle="fire splash:dismissed"
    ></on-signal>

    <on-event name="splash:dismissed" handle="call splash:hide"></on-event>

    <command
        name="splash:hide"
        do="`
      set $splashState to 'exiting'
      then
        fade-out    #splash.visible  200ms ease-in and
        slide-down  #splash.visible  180ms ease-in
      then
        set $splashState to 'hidden'
        then fire splash:hidden
    `"
    ></command>

    <command
        name="fetch-rate"
        args="[from:str  to:str]"
        do="`
      set $rateStatus to 'pending'
      then response <- @get '/api/exchange' [from: from  to: to]
      then match response
        [it   ok   ] ->
          set $exchangeRate to it.rate
          set $rateStatus   to 'resolved'
          then fire rate:updated [$exchangeRate]
        [nil  error] ->
          set $rateStatus to 'rejected'
          then fire rate:failed [$error]
      /match
    `"
    ></command>

    <command
        name="fetch-rate:retry"
        args="[from:str  to:str  attempt:int=0]"
        do="`
      match attempt
        [0 | 1 | 2] ->
          set $rateStatus to 'pending'
          try
            call fetch-rate [from: from  to: to]
          on-fail
            wait (attempt + 1) * 500ms
            then call fetch-rate:retry [from: from  to: to  attempt: attempt + 1]
          /try
        [_] ->
          fire rate:exhausted [from: from  to: to]
      /match
    `"
    ></command>

    <on-event
        name="app:boot"
        handle="`
      call splash:hide
      then fire! app:booted
    `"
    ></on-event>
</local-event-script>
